services:
  touchscreen:
    build:
      context: .
      target: development
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api/v1}
      VITE_RUNTIME_MODE: ${VITE_RUNTIME_MODE:-SIMULATOR}
      VITE_HARDWARE_PROFILE: ${VITE_HARDWARE_PROFILE:-XT2145}
      VITE_DEPLOYMENT_TYPE: ${VITE_DEPLOYMENT_TYPE:-TOUCH_SCREEN}
      VITE_CLUSTER_MEMBER: ${VITE_CLUSTER_MEMBER:-DEVICE_A}
      VITE_DISPLAY_TARGET: ${VITE_DISPLAY_TARGET:-SCREEN_1}
