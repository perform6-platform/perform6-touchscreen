services:
  touchscreen:
    build:
      context: .
      target: production
    image: perform6-touchscreen:local
    ports:
      - '5173:80'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/']
      interval: 30s
      timeout: 3s
      retries: 3
