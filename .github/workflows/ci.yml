name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Build & Release ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck

      - name: Build BrightSign ZIP
        run: |
          mkdir -p .release
          cp brightsign/autorun.brs .release/autorun.brs
          cp dist/index.html .release/index.html
          cp -r dist/assets .release/assets
          cd .release && zip -r ../perform6-touchscreen-ci.zip .
          cd ..

      - uses: actions/upload-artifact@v7
        with:
          name: brightsign-bundle
          path: perform6-touchscreen-ci.zip
          retention-days: 14

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: false
          tags: perform6-touchscreen:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
